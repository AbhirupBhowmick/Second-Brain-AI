<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Authentication - Glacier</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-dim": "#0f1524",
                        "primary": "#7dd3fc",
                        "on-primary-container": "#c8eaff",
                        "outline": "#4a6070",
                        "surface": "#0f1524",
                        "on-tertiary-fixed-variant": "#4d2a73",
                        "on-secondary": "#001f2e",
                        "background": "#0a0e1a",
                        "inverse-on-surface": "#0a0e1a",
                        "on-secondary-fixed-variant": "#2a4a5e",
                        "on-tertiary-container": "#e8d0ff",
                        "on-primary": "#001f2e",
                        "surface-container": "#141c2e",
                        "on-background": "#e0e8f0",
                        "primary-fixed-dim": "#7dd3fc",
                        "outline-variant": "#2a3a48",
                        "surface-container-low": "#111828",
                        "secondary": "#88b4cc",
                        "tertiary-fixed": "#e8d0ff",
                        "on-primary-fixed-variant": "#004d73",
                        "surface-container-high": "#1a2438",
                        "error-container": "#3d1414",
                        "on-tertiary-fixed": "#1a002e",
                        "secondary-fixed": "#c0d8e8",
                        "primary-fixed": "#c8eaff",
                        "tertiary-fixed-dim": "#c8a0f0",
                        "surface-container-lowest": "#0a0e1a",
                        "secondary-container": "#1a3a4e",
                        "surface-tint": "#7dd3fc",
                        "on-error": "#1a0000",
                        "inverse-primary": "#0a4c6e",
                        "primary-container": "#0e4d6e",
                        "tertiary": "#c8a0f0",
                        "on-surface": "#e0e8f0",
                        "on-primary-fixed": "#001f2e",
                        "on-secondary-container": "#c0d8e8",
                        "surface-variant": "#1a2438",
                        "tertiary-container": "#3d2060",
                        "secondary-fixed-dim": "#88b4cc",
                        "on-secondary-fixed": "#0d1f2b",
                        "surface-container-highest": "#202c42",
                        "inverse-surface": "#e0e8f0",
                        "surface-bright": "#1a2438",
                        "on-tertiary": "#1a002e",
                        "on-surface-variant": "#a0b4c4",
                        "error": "#ff6b6b",
                        "on-error-container": "#ffb3b3"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Inter", "sans-serif"],
                        "display": ["Inter", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Inter", "sans-serif"]
                    }
                }
            }
        }
    </script>
<style>
        body {
            background-color: #0a0e1a;
            color: #e0e8f0;
            font-family: 'Inter', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
        }

        /* Glassmorphism Classes */
        .glass-panel {
            background: rgba(15, 21, 36, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(125, 211, 252, 0.1);
        }

        .glass-panel-elevated {
            background: rgba(15, 21, 36, 0.75);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(125, 211, 252, 0.15);
            box-shadow: 0 0 30px rgba(125, 211, 252, 0.05);
        }
        
        .glow-input:focus {
            box-shadow: 0 0 15px rgba(125, 211, 252, 0.2);
            border-color: rgba(125, 211, 252, 0.4);
            outline: none;
        }

        /* Custom scrollbar for webkit */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(10, 14, 26, 1);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(42, 58, 72, 1);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(74, 96, 112, 1);
        }
    </style>
</head>
<body class="bg-background text-on-surface antialiased overflow-hidden">
<!-- Main Container: Split Layout -->
<div class="flex w-full min-h-screen">
<!-- Left Side: Abstract Graphic (Hidden on mobile) -->
<div class="hidden lg:flex lg:w-1/2 relative flex-col justify-between p-12 overflow-hidden border-r border-primary/10">
<!-- Background Image -->
<div class="absolute inset-0 z-0" data-alt="A highly detailed 3D abstract rendering of a glowing digital brain composed of interconnected neon blue and soft lavender nodes and geometric structures. The scene is set in a deep, atmospheric navy-black space, creating a sense of ethereal depth through layered translucent surfaces. The lighting emphasizes a premium, technical aesthetic, perfectly aligning with a dark-mode glassmorphism UI style." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuATqw2r81LwXWe9cjlyaJ0ZV3DYw-Z8Lh2GSFl0D5TlJr-W7V2mVv9SAO2iZwRH2ZFWBH3XQLyxH7z6-SBg8AesCcR8LB_L1jEscI0Rr_U85hX1olOWuwjdUqMDL8ctpuJAbbZS6yTlE8iVRiwtYtdy3Di7jwFpmR3d8lgndZsUj-_xUXQioO8gWICIAJibSH-V0_o6aQ-1BJVkNuH766owEhmDnSrh-PcZykKTO44xW4KINEQLrMKwLJKawekbbo2Gi2THtLyivRI'); background-size: cover; background-position: center;">
<!-- Overlay to blend image with background color -->
<div class="absolute inset-0 bg-background/80 backdrop-blur-[2px]"></div>
<!-- Subtle gradient overlay -->
<div class="absolute inset-0 bg-gradient-to-br from-primary/10 via-transparent to-tertiary/10"></div>
</div>
<!-- Content Over Graphic -->
<div class="relative z-10">
<div class="flex items-center gap-3 mb-8">
<span class="material-symbols-outlined text-primary text-3xl" data-weight="fill">hub</span>
<span class="font-headline font-bold text-2xl tracking-wider text-primary">Glacier</span>
</div>
</div>
<div class="relative z-10 max-w-md">
<h1 class="font-headline font-semibold text-4xl mb-4 text-on-surface leading-tight">Access the <br/><span class="text-primary">Knowledge Map</span></h1>
<p class="text-on-surface-variant text-lg font-body font-light">
                    Enter the deep focus mode. Your interconnected digital brain awaits in a secure, ethereal environment.
                </p>
</div>
</div>
<!-- Right Side: Authentication Form -->
<div class="w-full lg:w-1/2 flex items-center justify-center p-6 sm:p-12 relative">
<!-- Subtle background glow behind the card -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-96 h-96 bg-primary/5 rounded-full blur-[100px] pointer-events-none"></div>
<!-- Glassmorphism Card -->
<div class="glass-panel-elevated w-full max-w-md rounded-2xl p-8 sm:p-10 relative z-10">
<!-- Mobile Logo (Visible only on small screens) -->
<div class="flex lg:hidden items-center justify-center gap-2 mb-8">
<span class="material-symbols-outlined text-primary text-2xl" data-weight="fill">hub</span>
<span class="font-headline font-bold text-xl tracking-wider text-primary">Glacier</span>
</div>
<div class="text-center mb-8">
<h2 class="font-headline font-semibold text-2xl text-on-surface mb-2">Welcome Back</h2>
<p class="text-on-surface-variant text-sm font-body">Sign in to continue to your dashboard.</p>
</div>
<form class="space-y-6">
<!-- Email Input -->
<div class="space-y-2">
<label class="block text-sm font-medium text-on-surface-variant" for="email">Email Address</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant text-lg">mail</span>
</div>
<input class="w-full pl-10 pr-4 py-3 bg-surface-dim/60 border border-outline-variant/50 rounded-lg text-on-surface placeholder-on-surface-variant/50 glow-input transition-all duration-300 font-body text-sm" id="email" name="email" placeholder="name@company.com" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex items-center justify-between">
<label class="block text-sm font-medium text-on-surface-variant" for="password">Password</label>
<a class="text-xs text-primary hover:text-primary-fixed-dim transition-colors" href="#">Forgot password?</a>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant text-lg">lock</span>
</div>
<input class="w-full pl-10 pr-10 py-3 bg-surface-dim/60 border border-outline-variant/50 rounded-lg text-on-surface placeholder-on-surface-variant/50 glow-input transition-all duration-300 font-body text-sm" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-on-surface-variant hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-lg">visibility_off</span>
</button>
</div>
</div>
<!-- Submit Button -->
<button class="w-full py-3 px-4 bg-primary/20 hover:bg-primary/30 border border-primary/30 hover:border-primary/50 text-primary font-medium rounded-lg transition-all duration-300 flex items-center justify-center gap-2 shadow-[0_0_15px_rgba(125,211,252,0.1)] hover:shadow-[0_0_20px_rgba(125,211,252,0.2)]" type="submit">
<span>Sign In</span>
<span class="material-symbols-outlined text-sm">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="mt-8 mb-6 relative flex items-center">
<div class="flex-grow border-t border-outline-variant/50"></div>
<span class="flex-shrink-0 mx-4 text-on-surface-variant text-xs uppercase tracking-wider font-medium">Or continue with</span>
<div class="flex-grow border-t border-outline-variant/50"></div>
</div>
<!-- Google Auth Button -->
<button class="w-full py-3 px-4 glass-panel hover:bg-surface-dim/80 text-on-surface font-medium rounded-lg transition-all duration-300 flex items-center justify-center gap-3" type="button">
<!-- Custom SVG for Google since Material doesn't have brand icons -->
<svg class="w-5 h-5" fill="none" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25C22.56 11.47 22.49 10.72 22.36 10H12V14.26H17.92C17.66 15.63 16.88 16.8 15.71 17.58V20.34H19.28C21.36 18.42 22.56 15.6 22.56 12.25Z" fill="#4285F4"></path>
<path d="M12 23C14.97 23 17.46 22.02 19.28 20.34L15.71 17.58C14.73 18.24 13.48 18.64 12 18.64C9.13 18.64 6.7 16.7 5.84 14.09H2.15V16.95C3.96 20.55 7.68 23 12 23Z" fill="#34A853"></path>
<path d="M5.84 14.09C5.62 13.43 5.5 12.73 5.5 12C5.5 11.27 5.62 10.57 5.84 9.91V7.05H2.15C1.41 8.53 1 10.22 1 12C1 13.78 1.41 15.47 2.15 16.95L5.84 14.09Z" fill="#FBBC05"></path>
<path d="M12 5.36C13.62 5.36 15.07 5.92 16.21 7.01L19.35 3.87C17.46 2.11 14.97 1 12 1C7.68 1 3.96 3.45 2.15 7.05L5.84 9.91C6.7 7.3 9.13 5.36 12 5.36Z" fill="#EA4335"></path>
</svg>
<span>Google</span>
</button>
<!-- Sign Up Link -->
<p class="mt-8 text-center text-sm text-on-surface-variant font-body">
                    Don't have an account? 
                    <a class="text-primary hover:text-primary-fixed font-medium transition-colors" href="#">Sign up</a>
</p>
</div>
</div>
</div>
</body></html>
